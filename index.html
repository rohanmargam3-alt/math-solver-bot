<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧮 Math Solver Bot</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.4.2/math.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', -apple-system, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; padding: 20px; 
        }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { text-align: center; color: white; margin-bottom: 30px; font-size: 2.5em; }
        .chat-container { 
            background: white; border-radius: 20px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
            height: 600px; overflow-y: auto; padding: 20px;
            backdrop-filter: blur(10px);
        }
        .message { 
            margin: 15px 0; padding: 15px 20px; 
            border-radius: 20px; max-width: 85%; 
            word-break: break-word;
        }
        .user { background: #4f46e5; color: white; margin-left: auto; }
        .bot { background: #f8fafc; border: 1px solid #e2e8f0; }
        .math-render { font-family: 'Times New Roman', serif; font-size: 1.1em; }
        .input-area { 
            display: flex; gap: 15px; margin-top: 20px; 
            background: white; padding: 20px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        input { 
            flex: 1; padding: 15px 20px; border: 2px solid #e2e8f0; 
            border-radius: 25px; font-size: 16px; outline: none;
            transition: border-color 0.3s;
        }
        input:focus { border-color: #4f46e5; }
        button { 
            padding: 15px 30px; background: #10b981; color: white; 
            border: none; border-radius: 25px; cursor: pointer; 
            font-weight: bold; transition: all 0.3s;
        }
        button:hover { background: #059669; transform: translateY(-2px); }
        .solve-btn { background: #f59e0b; }
        .solve-btn:hover { background: #d97706; }
        .examples { 
            display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; 
            justify-content: center;
        }
        .example-btn { 
            padding: 8px 16px; background: rgba(255,255,255,0.2); 
            border: 1px solid rgba(255,255,255,0.3); color: white;
            border-radius: 20px; cursor: pointer; font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧮 Math Solver Bot</h1>
        <div id="chat" class="chat-container">
            <div class="message bot">
                Hi! I'm your Math Solver 🤖 Ask me anything:<br>
                - Basic: "2+2", "5*3/2"<br>
                - Algebra: "solve x^2 - 5x + 6 = 0"<br>
                - Calculus: "derivative of x^3 + 2x"<br>
                - Trig: "sin(30°)", "cos(pi/3)"<br>
                - Matrix: "[[1,2],[3,4]] * [[5,6],[7,8]]"
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Solve: 2x + 3 = 7..." autocomplete="off">
            <button onclick="sendMessage()">Send</button>
            <button class="solve-btn" onclick="quickSolve()">Solve</button>
        </div>
        <div class="examples">
            <button class="example-btn" onclick="setInput('2+2*3')">2+2×3</button>
            <button class="example-btn" onclick="setInput('solve x^2-5x+6=0')">Quadratic</button>
            <button class="example-btn" onclick="setInput('derivative(x^3)')">Derivative</button>
            <button class="example-btn" onclick="setInput('sin(30 deg)')">Trig</button>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const userInput = document.getElementById('userInput');

        function addMessage(text, isUser = false) {
            const msg = document.createElement('div');
            msg.className = `message ${isUser ? 'user' : 'bot'}`;
            msg.innerHTML = text;
            chat.appendChild(msg);
            chat.scrollTop = chat.scrollHeight;
        }

        function renderMath(expr) {
            try {
                return math.format(math.evaluate(expr), { precision: 4 });
            } catch {
                return expr;
            }
        }

        function solveEquation(input) {
            const eq = input.toLowerCase().replace(/solve /, '').replace('=', '-');
            try {
                // Simple linear: ax + b = 0
                const match = eq.match(/([+-]?\d*\.?\d*)x([+-]\d*\.?\d*)/);
                if (match) {
                    const a = parseFloat(match[1] || 1);
                    const b = parseFloat(match[2]);
                    return `x = ${renderMath((-b/a).toString())}`;
                }
                
                // Quadratic: ax^2 + bx + c = 0
                const quadMatch = eq.match(/x\^2([+-]\d*)x([+-]\d*)/);
                if (quadMatch) {
                    const a = 1, b = parseFloat(quadMatch[1] || 0), c = parseFloat(quadMatch[2]);
                    const disc = b*b - 4*a*c;
                    if (disc >= 0) {
                        const x1 = (-b + Math.sqrt(disc))/(2*a);
                        const x2 = (-b - Math.sqrt(disc))/(2*a);
                        return disc > 0 ? `x₁ = ${renderMath(x1)}, x₂ = ${renderMath(x2)}` : `x = ${renderMath(x1)}`;
                    }
                }
            } catch {}
            return null;
        }

        function getBotResponse(input) {
            const cleanInput = input.toLowerCase().trim();
            
            // Calculus
            if (cleanInput.includes('derivative') || cleanInput.includes("d/dx")) {
                try {
                    const expr = input.replace(/derivative\s+of\s+|d\/dx\s+/, '');
                    const node = math.derivative(expr, 'x');
                    return `Derivative: ${node.toString()}`;
                } catch { }
            }
            
            // Solve equations
            if (cleanInput.startsWith('solve ')) {
                const result = solveEquation(input);
                if (result) return `💡 Solution: ${result}`;
            }
            
            // Direct math evaluation
            try {
                const result = math.evaluate(input);
                return `✅ ${input} = <span class="math-render">${renderMath(result)}</span>`;
            } catch {
                return "🤔 Let me think... Try: '2+2', 'solve x+3=7', 'derivative(x^2)'";
            }
        }

        function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;
            
            addMessage(text, true);
            userInput.value = '';
            
            setTimeout(() => {
                const response = getBotResponse(text);
                addMessage(response);
            }, 800);
        }

        function quickSolve() {
            sendMessage();
        }

        function setInput(text) {
            userInput.value = text;
            userInput.focus();
        }

        // Enter key
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Welcome message animation
        setTimeout(() => chat.scrollTop = chat.scrollHeight, 100);
    </script>
</body>
</html>
